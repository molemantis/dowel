{% extends "base.html" %}
{% block title %}Register — Dowel{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="card-title mb-4 text-center">🔧 Create Account</h3>
        <form method="POST" action="{{ url_for('auth.register') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Display Name <span class="text-muted fw-normal">(optional)</span></label>
            <input type="text" name="display_name" class="form-control" placeholder="How others see your name">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required minlength="6">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-success btn-lg">Create Account</button>
          </div>
        </form>
        <hr>
        <p class="text-center mb-0">Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
